<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --sans:'Inter','PingFang HK',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --bg:#f5f7fa; --surface:#fff; --surface2:#f8fafc;
  --border:#e4e9f0; --border2:#d0d9e6;
  --text:#111827; --text2:#6b7280; --text3:#9ca3af;
  --blue:#2563eb; --blue-lt:#eff6ff; --blue-dk:#1d4ed8; --blue-ring:rgba(37,99,235,.15);
  --green:#059669; --green-lt:#ecfdf5;
  --amber:#d97706; --amber-lt:#fffbeb;
  --red:#dc2626; --red-lt:#fef2f2;
  --purple:#7c3aed; --purple-lt:#f5f3ff;
  --teal:#0891b2; --teal-lt:#ecfeff;
  --topbar:#0f172a;
  --r-sm:6px; --r:10px; --r-lg:14px; --r-xl:20px;
  --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sh-lg:0 20px 48px rgba(0,0,0,.12),0 8px 16px rgba(0,0,0,.06);
}
[data-theme="dark"] {
  --bg:#0d1117; --surface:#161b22; --surface2:#1c2128;
  --border:#30363d; --border2:#3d444d;
  --text:#e6edf3; --text2:#8b949e; --text3:#484f58;
  --blue:#4493f8; --blue-lt:#1c2d41; --blue-dk:#388bfd; --blue-ring:rgba(68,147,248,.2);
  --green:#3fb950; --green-lt:#122d1c;
  --amber:#d29922; --amber-lt:#2d1f00;
  --red:#f85149; --red-lt:#2d0f0e;
  --purple:#a371f7; --purple-lt:#1e1244;
  --teal:#39c5cf; --teal-lt:#0d2128;
  --topbar:#010409;
  --sh-sm:0 1px 3px rgba(0,0,0,.3); --sh:0 4px 12px rgba(0,0,0,.4); --sh-lg:0 20px 48px rgba(0,0,0,.5);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0d1117; --surface:#161b22; --surface2:#1c2128;
  --border:#30363d; --border2:#3d444d;
  --text:#e6edf3; --text2:#8b949e; --text3:#484f58;
  --blue:#4493f8; --blue-lt:#1c2d41; --blue-dk:#388bfd; --blue-ring:rgba(68,147,248,.2);
  --green:#3fb950; --green-lt:#122d1c; --amber:#d29922; --amber-lt:#2d1f00;
  --red:#f85149; --red-lt:#2d0f0e; --purple:#a371f7; --purple-lt:#1e1244;
  --teal:#39c5cf; --teal-lt:#0d2128; --topbar:#010409;
  --sh-sm:0 1px 3px rgba(0,0,0,.3); --sh:0 4px 12px rgba(0,0,0,.4); --sh-lg:0 20px 48px rgba(0,0,0,.5);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:var(--sans)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Topbar */
.topbar{background:var(--topbar);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(255,255,255,.06)}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-mark{background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-sm);letter-spacing:.6px}
.topbar-title{font-size:14px;font-weight:600;color:rgba(255,255,255,.9)}
.topbar-sep{width:1px;height:18px;background:rgba(255,255,255,.12)}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.4)}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:99px;padding:4px 12px 4px 5px;cursor:pointer;transition:background .15s;color:rgba(255,255,255,.9);font-size:12px}
.user-chip:hover{background:rgba(255,255,255,.12)}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sign-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 16px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.sign-btn:hover{background:rgba(255,255,255,.18)}
.theme-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;font-size:15px;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center}
.theme-btn:hover{background:rgba(255,255,255,.18)}

/* Main */
.main{padding:20px 24px;max-width:1320px;margin:0 auto;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--sh-sm);transition:box-shadow .2s}
.stat-card:hover{box-shadow:var(--sh)}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:28px;font-weight:700;line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.sv-p{color:var(--amber)}.sv-a{color:var(--green)}.sv-r{color:var(--text2)}.sv-c{color:var(--red)}.sv-t{color:var(--text)}

/* Panel */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden}
.panel-bar{display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;min-height:52px}
.tab-strip{display:flex}
.tab-item{padding:16px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap}
.tab-item.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-item:hover:not(.active){color:var(--text)}
.btn-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{background:var(--blue-dk);color:#fff}
.btn-success{background:var(--green-lt);color:var(--green);border-color:var(--green)}.btn-success:hover{background:var(--green);color:#fff}
.btn-danger{background:var(--red-lt);color:var(--red);border-color:var(--red)}.btn-danger:hover{background:var(--red);color:#fff}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center}
.btn:disabled{opacity:.45;cursor:not-allowed}
.filter-pill{padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all .15s}
.filter-pill.active{background:var(--blue-lt);color:var(--blue);border-color:var(--blue)}
.filter-pill:hover:not(.active){border-color:var(--border2)}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:12px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-ring)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.sort-sel{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;outline:none}
.sort-sel:focus{border-color:var(--blue)}

/* Table */
.tbl-outer{overflow-x:auto;position:relative}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:10px 14px;text-align:left;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
thead th.th-check{width:40px}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:var(--surface2)}
tbody tr.row-selected td{background:var(--blue-lt)}
tbody tr.row-conflict td{background:var(--red-lt)}
.t-name{font-weight:600;font-size:13px}
.t-email{font-size:11px;color:var(--text2);margin-top:2px}
.ev-name{font-weight:600;font-size:13px}
.ev-desc{font-size:11px;color:var(--text2);background:var(--surface2);padding:3px 8px;border-radius:var(--r-sm);margin-top:4px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conflict-pill{display:inline-flex;align-items:center;gap:4px;background:var(--red-lt);border:1px solid var(--red);color:var(--red);border-radius:var(--r-sm);padding:3px 8px;font-size:11px;font-weight:600;margin-top:5px;max-width:230px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.overdue-tag{display:inline-flex;align-items:center;gap:3px;background:#7f1d1d;color:#fecaca;font-size:9px;font-weight:800;letter-spacing:.4px;padding:2px 6px;border-radius:99px;text-transform:uppercase;margin-left:5px;animation:pulse-r 1.6s infinite}
.time-mono{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:var(--r-sm);white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap;letter-spacing:.2px}
.bd-pending{background:var(--amber-lt);color:var(--amber)}
.bd-approved{background:var(--green-lt);color:var(--green)}
.bd-rejected{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.bd-amend{background:var(--purple-lt);color:var(--purple)}
.bd-conflict{background:var(--red-lt);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-pending{background:var(--amber)}
.dot-approved{background:var(--green);animation:pulse-g 2s infinite}
.dot-conflict{background:var(--red);animation:pulse-r 1.4s infinite}
@keyframes pulse-g{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pulse-r{0%,100%{opacity:1}50%{opacity:.3}}
.acts{display:flex;gap:4px;flex-wrap:wrap}
.act-btn{padding:4px 9px;border-radius:var(--r-sm);font-size:11px;font-weight:600;cursor:pointer;border:1px solid;background:transparent;transition:all .12s;white-space:nowrap}
.ab-ok{border-color:var(--green);color:var(--green)}.ab-ok:hover{background:var(--green-lt)}
.ab-no{border-color:var(--red);color:var(--red)}.ab-no:hover{background:var(--red-lt)}
.ab-am{border-color:var(--purple);color:var(--purple)}.ab-am:hover{background:var(--purple-lt)}
.ab-ed{border-color:var(--border2);color:var(--text2)}.ab-ed:hover{background:var(--surface2)}
.ab-wa{border-color:#25d366;color:#25d366}.ab-wa:hover{background:#f0fdf4}
.pdf-link{color:var(--red);font-size:11px;font-weight:600;text-decoration:none}
.pdf-link:hover{text-decoration:underline}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;color:var(--text3);gap:10px;text-align:center}
.empty-icon{font-size:40px;opacity:.4}
.empty-title{font-size:15px;font-weight:600;color:var(--text2)}
.bulk-bar{display:none;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--blue-lt);border-bottom:1px solid var(--blue);gap:12px;flex-wrap:wrap}
.bulk-bar.show{display:flex}
.bulk-info{font-size:13px;font-weight:600;color:var(--blue)}
.tbl-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.05);z-index:10;align-items:center;justify-content:center;font-size:13px;color:var(--text2)}
.tbl-overlay.show{display:flex}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Mobile cards */
@media(max-width:640px){.tbl-outer table{display:none}.mob-cards{display:block}}
@media(min-width:641px){.mob-cards{display:none}}
.mob-cards{padding:12px}
.m-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;transition:box-shadow .15s}
.m-card:hover{box-shadow:var(--sh)}
.m-card.m-conflict{border-color:var(--red);background:var(--red-lt)}
.m-card.m-sel{border-color:var(--blue);background:var(--blue-lt)}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.mc-title{font-size:14px;font-weight:700;flex:1}
.mc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.mc-pill{display:inline-flex;align-items:center;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:3px 9px;font-size:11px;color:var(--text2)}
.mc-acts{display:flex;gap:6px;flex-wrap:wrap}
.mc-clash{background:var(--red-lt);border:1px solid var(--red);border-radius:var(--r-sm);padding:5px 9px;font-size:11px;color:var(--red);margin-bottom:8px}

/* Calendar */
.cal-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border)}
.cal-nav-g{display:flex;align-items:center;gap:10px}
.cal-month-lbl{font-size:15px;font-weight:700;min-width:130px;text-align:center}
.cal-legend{display:flex;gap:16px;padding:8px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.leg-sw{width:12px;height:12px;border-radius:3px}
.ls-ok{background:var(--green)}.ls-pend{background:var(--amber)}.ls-clash{background:var(--red)}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);background:var(--surface2)}
.cal-dow{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:8px 2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:108px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px 5px 5px}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.dim{background:var(--surface2)}.cal-cell.now{background:var(--blue-lt)}
.day-n{font-size:12px;font-weight:600;color:var(--text2);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:4px}
.cal-cell.now .day-n{background:var(--blue);color:#fff}
.cal-cell.dim .day-n{color:var(--text3)}
.cal-ev{font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;line-height:1.6;transition:opacity .1s;border-left:3px solid}
.cal-ev:hover{opacity:.75}
.cev-ok{background:var(--green-lt);color:#065f46;border-color:var(--green)}
.cev-pend{background:var(--amber-lt);color:#78350f;border-color:var(--amber)}
.cev-clash{background:var(--red-lt);color:#991b1b;border-color:var(--red);animation:blink-ev 1.8s ease-in-out infinite}
@keyframes blink-ev{0%,100%{opacity:1}50%{opacity:.5}}
.cal-more{font-size:10px;color:var(--blue);cursor:pointer;padding:1px 5px;font-weight:600}

/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:18px}
@media(max-width:700px){.charts-grid{grid-template-columns:1fr}}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;overflow:hidden}
.chart-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--text2);min-width:70px;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:var(--surface2);border-radius:99px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:var(--blue);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .6s cubic-bezier(.34,1.56,.64,1);min-width:24px}
.bar-fill span{font-size:10px;font-weight:700;color:#fff}
.hm-cell{width:100%;aspect-ratio:1;border-radius:2px;background:var(--surface2);cursor:default;transition:transform .1s}
.hm-cell:hover{transform:scale(1.3)}
.heatmap-day-lbl{display:grid;grid-template-columns:repeat(7,1fr);font-size:10px;color:var(--text3);text-align:center;margin-bottom:4px}
.heatmap-hr-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:4px}

/* Audit log */
.audit-log{padding:16px}
.audit-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.audit-entry:last-child{border-bottom:none}
.audit-time{color:var(--text3);white-space:nowrap;font-family:var(--mono);font-size:11px;min-width:110px}
.audit-actor{font-weight:600;color:var(--blue);min-width:120px}
.audit-desc{color:var(--text2);flex:1}
.a-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ad-ok{background:var(--green)}.ad-no{background:var(--red)}.ad-am{background:var(--purple)}.ad-sub{background:var(--blue)}.ad-ed{background:var(--amber)}

/* My bookings */
.my-bookings{padding:16px 20px}
.mb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;margin-bottom:12px;transition:box-shadow .15s}
.mb-card:hover{box-shadow:var(--sh-sm)}
.mb-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.mb-name{font-size:14px;font-weight:700}
.mb-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.mb-pill{background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:2px 9px;font-size:11px;color:var(--text2)}
.mb-desc{font-size:12px;color:var(--text2)}

/* Date mode picker */
.date-mode-seg{display:flex;border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px}
.dms-btn{flex:1;padding:9px 6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:var(--surface);color:var(--text2);transition:all .15s;border-right:1px solid var(--border)}
.dms-btn:last-child{border-right:none}
.dms-btn.active{background:var(--blue);color:#fff}
.dms-btn:hover:not(.active){background:var(--surface2)}
.recur-panel{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:14px}
.recur-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.recur-row:last-child{margin-bottom:0}
.recur-lbl{font-size:12px;font-weight:600;color:var(--text2);min-width:40px}
.dow-btns{display:flex;gap:5px;flex-wrap:wrap}
.dow-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text2)}
.dow-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.dow-btn:hover:not(.active){border-color:var(--blue);color:var(--blue)}
.freq-sel,.range-inp{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:12px;outline:none;font-family:var(--sans)}
.freq-sel:focus,.range-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-ring)}
.recur-preview{background:var(--blue-lt);border:1px solid var(--blue);border-radius:var(--r);padding:10px 12px;margin-top:10px;font-size:12px;color:var(--blue)}
.recur-dates-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.recur-date-tag{background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:2px 9px;font-size:11px;color:var(--text2);font-family:var(--mono)}
.cdp-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cdp-month{font-size:13px;font-weight:700}
.cdp-nav{display:flex;gap:4px}
.cdp-nav button{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.cdp-nav button:hover{background:var(--surface2)}
.cdp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px}
.cdp-dow{text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:4px 0}
.cdp-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;color:var(--text2);border:1.5px solid transparent}
.cdp-day:hover:not(.cdp-other):not(.cdp-past){border-color:var(--blue);color:var(--blue)}
.cdp-day.cdp-today{font-weight:800;color:var(--blue)}
.cdp-day.cdp-sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.cdp-day.cdp-other{color:var(--text3);cursor:default}
.cdp-day.cdp-past{color:var(--text3);cursor:not-allowed;opacity:.4}
.cdp-tags{display:flex;flex-wrap:wrap;gap:5px;min-height:28px}
.cdp-tag{display:flex;align-items:center;gap:4px;background:var(--blue-lt);border:1px solid var(--blue);border-radius:99px;padding:3px 8px 3px 10px;font-size:11px;color:var(--blue);font-family:var(--mono)}
.cdp-tag-x{cursor:pointer;font-size:12px;opacity:.6;font-family:var(--sans);line-height:1}
.cdp-tag-x:hover{opacity:1}
.cdp-empty{font-size:12px;color:var(--text3);padding:4px 0}

/* Venue checker */
.venue-checker{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-top:14px;transition:border-color .2s}
.vc-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.vc-title{font-size:12px;font-weight:700;color:var(--text2)}
.vc-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px}
.vc-free{background:var(--green-lt);color:var(--green)}.vc-busy{background:var(--red-lt);color:var(--red)}
.vc-body{padding:12px 14px}
.vc-empty{font-size:12px;color:var(--text3);text-align:center;padding:10px 0}
.vc-slot{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r-sm);margin-bottom:4px;font-size:12px}
.vc-slot-ok{background:var(--green-lt);border:1px solid var(--green)}
.vc-slot-busy{background:var(--red-lt);border:1px solid var(--red)}
.vc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.vc-time{font-family:var(--mono);font-size:11px;font-weight:500;flex-shrink:0}
.vc-name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

/* Teacher form */
.form-shell{max-width:680px;margin:28px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--sh);overflow:hidden;animation:fadeUp .25s ease both}
.form-hero{background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 40%,#1d4ed8 100%);padding:28px 32px;color:#fff}
.form-hero-badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:99px;font-size:11px;font-weight:700;padding:4px 12px;letter-spacing:.5px;margin-bottom:10px}
.form-hero h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.form-hero p{font-size:13px;opacity:.75;margin-top:4px}
.form-body{padding:28px 32px}
.form-section{margin-bottom:24px}
.section-hdr{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px}
.form-grid{display:grid;gap:14px}
.form-grid.g2{grid-template-columns:1fr 1fr}
.form-grid.g3{grid-template-columns:1fr 1fr 1fr}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--r);padding:9px 12px;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-ring)}
input[type="file"]{padding:6px 10px;border:1.5px dashed var(--border2);border-radius:var(--r);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer}
input[type="file"]:hover{border-color:var(--blue)}
.fld .hint{font-size:11px;color:var(--text3);margin-top:4px}
.fld textarea{resize:vertical}
.submit-btn{width:100%;height:48px;background:var(--blue);color:#fff;border:none;border-radius:var(--r-lg);font-size:15px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:.2px;margin-top:6px}
.submit-btn:hover{background:var(--blue-dk)}
.submit-btn:active{transform:scale(.99)}
.submit-btn:disabled{background:#93c5fd;cursor:not-allowed}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 54px);padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--sh);padding:40px 44px;max-width:380px;width:100%;text-align:center;animation:fadeUp .3s ease both}
.login-icon{font-size:48px;margin-bottom:16px}
.login-card h2{font-size:20px;font-weight:700;margin-bottom:6px}
.login-card p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:24px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;height:46px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--r-lg);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text)}
.google-btn:hover{background:var(--surface2);border-color:var(--blue)}
.g-logo{font-size:18px}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:500;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--sh-lg);width:480px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-hdr h3{font-size:15px;font-weight:700}
.modal-x{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:var(--surface2);color:var(--text2);font-size:16px;transition:background .15s}
.modal-x:hover{background:var(--border);color:var(--text)}
.modal-body{padding:20px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px}
.modal-footer button{flex:1}
.ism-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 15px;margin-bottom:16px}
.ism-title{font-size:14px;font-weight:700;margin-bottom:6px}
.ism-pills{display:flex;gap:6px;flex-wrap:wrap}
.ism-pill{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:3px 10px;font-size:11px;color:var(--text2)}
.action-seg{display:flex;gap:0;border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px}
.aseg-btn{flex:1;padding:9px 6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:var(--surface);color:var(--text2);transition:all .15s;border-right:1px solid var(--border)}
.aseg-btn:last-child{border-right:none}
.aseg-btn:hover:not(.aseg-active){background:var(--surface2)}
.aseg-btn.aseg-active.seg-ok{background:var(--green-lt);color:var(--green)}
.aseg-btn.aseg-active.seg-no{background:var(--red-lt);color:var(--red)}
.aseg-btn.aseg-active.seg-am{background:var(--purple-lt);color:var(--purple)}
.email-preview{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-size:12px;line-height:1.7;color:var(--text2);white-space:pre-wrap;margin-top:10px}
.ep-ok{border-color:var(--green);background:var(--green-lt);color:#065f46}
.ep-no{border-color:var(--red);background:var(--red-lt);color:#991b1b}
.ep-am{border-color:var(--purple);background:var(--purple-lt);color:#4c1d95}
.m2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Popover */
.popover{display:none;position:fixed;z-index:800;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);padding:14px 16px;width:260px;font-size:13px}
.popover.show{display:block}
.pop-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pop-title{font-weight:700;font-size:13px;flex:1;line-height:1.4}
.pop-close{cursor:pointer;color:var(--text3);font-size:16px;margin-left:8px;line-height:1}
.pop-close:hover{color:var(--text)}
.pop-row{display:flex;gap:8px;margin-bottom:5px;font-size:12px}
.pop-key{color:var(--text3);min-width:36px;flex-shrink:0}
.pop-val{color:var(--text);font-weight:500}
.pop-conflict{background:var(--red-lt);border:1px solid var(--red);border-radius:var(--r-sm);padding:7px 9px;margin-top:9px;font-size:11px;color:var(--red)}
.pop-conflict strong{display:block;margin-bottom:2px;font-size:11px}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:11px 22px;border-radius:var(--r-lg);font-size:13px;font-weight:500;z-index:9999;box-shadow:var(--sh-lg);opacity:0;transition:opacity .25s;pointer-events:none;max-width:520px;text-align:center;white-space:pre-line}
#toast.show{opacity:1}
#toast.t-err{background:var(--red)}
#toast.t-warn{background:#92400e}
#toast.t-ok{background:#064e3b}

/* Loading */
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 54px);gap:10px;color:var(--text2);font-size:14px}

/* Responsive */
@media(max-width:900px){.stats-grid{grid-template-columns:repeat(3,1fr)}.hide-md{display:none}.main{padding:14px 16px}}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}.form-grid.g2,.form-grid.g3{grid-template-columns:1fr}.form-body{padding:20px}.form-hero{padding:20px}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo-mark">LWCPS</span>
    <div class="topbar-sep"></div>
    <span class="topbar-title">活動申請系統</span>
    <span class="topbar-sub" id="tsub"></span>
  </div>
  <div class="topbar-right">
    <button class="sign-btn" id="sign-btn" onclick="signIn()" style="display:none">登入 Google</button>
    <div class="user-chip" id="user-chip" style="display:none" onclick="signOut()">
      <div class="avatar" id="uavatar"></div>
      <span id="uname"></span>
      <span style="opacity:.4;font-size:10px;margin-left:2px">登出</span>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="切換深色/淺色模式">🌙</button>
  </div>
</div>

<div id="app"><div class="loading-screen"><div class="spinner"></div>載入中...</div></div>

<!-- Action Modal -->
<div class="modal-overlay" id="actionModal">
  <div class="modal-card">
    <div class="modal-hdr">
      <h3 id="am-title">處理申請</h3>
      <button class="modal-x" onclick="closeActionModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="ism-card">
        <div class="ism-title" id="am-event"></div>
        <div class="ism-pills" id="am-pills"></div>
      </div>
      <div class="action-seg">
        <button class="aseg-btn seg-ok aseg-active" id="aseg-ok" onclick="setActionTab('ok')">✓ 批准</button>
        <button class="aseg-btn seg-no" id="aseg-no" onclick="setActionTab('no')">✕ 拒絕</button>
        <button class="aseg-btn seg-am" id="aseg-am" onclick="setActionTab('am')">↩ 要求修改</button>
      </div>
      <div id="apanel-ok">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px">批准後將同步至 Google 日曆並發送通知電郵。</div>
        <div class="email-preview ep-ok" id="prev-ok"></div>
      </div>
      <div id="apanel-no" style="display:none">
        <div class="fld"><label>拒絕原因 <span style="color:var(--red)">*</span></label>
          <textarea id="rej-reason" rows="3" placeholder="例：該日期場地已有其他預訂。" oninput="refreshPreviews()"></textarea>
        </div>
        <div class="email-preview ep-no" id="prev-no"></div>
      </div>
      <div id="apanel-am" style="display:none">
        <div class="fld"><label>修改建議 <span style="color:var(--purple)">*</span></label>
          <textarea id="am-sug" rows="3" placeholder="例：建議改為 14:00–16:00 或使用多用途室。" oninput="refreshPreviews()"></textarea>
        </div>
        <div class="email-preview ep-am" id="prev-am"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeActionModal()">取消</button>
      <button class="btn btn-primary" id="am-confirm" onclick="confirmAction()">確認批准</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal-card" style="width:400px">
    <div class="modal-hdr">
      <h3>修正申請資料</h3>
      <button class="modal-x" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="m-id">
      <div class="fld" style="margin-bottom:10px"><label>活動名稱</label><input type="text" id="m-event"></div>
      <div class="fld" style="margin-bottom:10px"><label>日期</label><input type="date" id="m-date"></div>
      <div class="m2col" style="margin-bottom:10px">
        <div class="fld"><label>開始時間</label><input type="time" id="m-start"></div>
        <div class="fld"><label>結束時間</label><input type="time" id="m-end"></div>
      </div>
      <div class="fld"><label>場地</label><input type="text" id="m-venue"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">確認修正</button>

  </div>
</div>

<!-- Popover -->
<div class="popover" id="popover">
  <div class="pop-hdr">
    <div class="pop-title" id="pop-title"></div>
    <span class="pop-close" onclick="closePop()">✕</span>

  <div class="pop-row"><span class="pop-key">老師</span><span class="pop-val" id="pop-teacher"></span></div>

  <div class="pop-row"><span class="pop-key">時段</span><span class="pop-val" id="pop-time"></span></div>
  <div class="pop-row"><span class="pop-key">場地</span><span class="pop-val" id="pop-venue"></span></div>

<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client"></script>
<script>
// ─── STATE ──────────────────────────────────────────────
let gUser=null, gToken=null, allItems=[];
let calYear, calMonth, activeTab="list";
let currentFilter="all", currentActionTab="ok", currentActionItem=null;
let searchQuery="", sortField="date", sortDir=1;
let selectedIds=new Set();
let _dateMode="single", _selDow=[], _customDates=new Set();
let _cdpYear, _cdpMonth;
const _n=new Date();
calYear=_n.getFullYear(); calMonth=_n.getMonth();
_cdpYear=_n.getFullYear(); _cdpMonth=_n.getMonth();

const SCOPES=[
  "https://www.googleapis.com/auth/spreadsheets",
  "https://www.googleapis.com/auth/calendar",
  "https://www.googleapis.com/auth/drive.file",
  "https://www.googleapis.com/auth/gmail.send",
  "email","profile"
].join(" ");

const VENUES=["禮堂","操場","STEM Lab","圖書館","多用途室","其他"];
const MONTHS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
const CDPMONTHS=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

// ─── AUTH ────────────────────────────────────────────────
let tc;
function initAuth(){
  tc=google.accounts.oauth2.initTokenClient({
    client_id:CFG.CLIENT_ID,scope:SCOPES,
    callback:function(r){
      if(r.error){toast("登入失敗："+r.error,"err");return;}
      gToken=r.access_token; fetchUser();
    }
  });
  sessionStorage.removeItem("lwcps_t");
  renderApp();
}
async function fetchUser(){
  try{
    const r=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+gToken}});
    if(!r.ok)throw 0;
    gUser=await r.json(); updateBar(); renderApp();
  }catch{gToken=null;gUser=null;renderApp();}
}
function signIn(){tc.requestAccessToken({prompt:""});}
function signOut(){if(gToken)google.accounts.oauth2.revoke(gToken);gToken=null;gUser=null;updateBar();renderApp();}
function isAdmin(){return gUser&&CFG.ADMIN_EMAILS.includes(gUser.email.toLowerCase());}
function updateBar(){
  document.getElementById("tsub").textContent=gUser?(isAdmin()?"管理後台":"老師申請表"):"";
  document.getElementById("sign-btn").style.display=gUser?"none":"block";
  const chip=document.getElementById("user-chip");
  chip.style.display=gUser?"flex":"none";
  if(gUser){document.getElementById("uavatar").textContent=(gUser.name||gUser.email)[0].toUpperCase();document.getElementById("uname").textContent=gUser.name||gUser.email;}
}

// ─── ROUTER ──────────────────────────────────────────────
function renderApp(){updateBar();if(!gUser){renderLogin();return;}if(isAdmin())loadAdmin();else renderTeacherShell();}

// ─── LOGIN ───────────────────────────────────────────────
function renderLogin(){
  document.getElementById("app").innerHTML=`<div class="login-page"><div class="login-card"><div class="login-icon">🏫</div><h2>LWCPS 活動申請系統</h2><p>請使用學校 Google 帳號登入<br>老師可提交申請，管理員可審批</p><button class="google-btn" onclick="signIn()"><span class="g-logo">G</span> 使用學校 Google 帳號登入</button></div></div>`;
}

// ─── TEACHER SHELL ───────────────────────────────────────
function renderTeacherShell(){
  document.getElementById("app").innerHTML=`<div style="max-width:700px;margin:0 auto"><div style="background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 20px"><button class="tab-item active" id="tt-form" onclick="showTTab('form',this)">申請場地</button><button class="tab-item" id="tt-mine" onclick="showTTab('mine',this)">我的申請</button></div><div id="teacher-panel"></div></div>`;
  showTTab("form",document.getElementById("tt-form"));
}
function showTTab(tab,btn){
  document.querySelectorAll("#tt-form,#tt-mine").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  var panel=document.getElementById("teacher-panel");
  if(tab==="form") renderFormInto(panel);
  else renderMyBookings(panel);
}

// ─── TEACHER FORM ────────────────────────────────────────
function renderFormInto(container){
  var vo=VENUES.map(function(v){return "<option>"+v+"</option>";}).join("");
  container.innerHTML=`
  <div class="form-shell" style="margin:0;border-radius:0;border-left:none;border-right:none;border-bottom:none">
    <div class="form-hero">
      <div class="form-hero-badge">LWCPS · 2025–26</div>
      <h1>活動場地申請</h1>
      <p>提交後管理員將盡快審批，並以電郵通知結果</p>
    </div>
    <div class="form-body">
      <div class="form-section">
        <div class="section-hdr">基本資料</div>
        <div class="form-grid g2">
          <div class="fld"><label>姓名</label><input type="text" id="f-teacher" value="${esc(gUser.name||"")}" required></div>

// ─── DATE MODE ───────────────────────────────────────────
function setDateMode(mode){
  _dateMode=mode;
  ["single","recur","custom"].forEach(function(m){
    var dp=document.getElementById("dp-"+m);
    var db=document.getElementById("dms-"+m);
    if(dp) dp.style.display=m===mode?"block":"none";
    if(db) db.classList.toggle("active",m===mode);
  });
  if(mode==="custom") buildCdp();
  if(mode==="recur") updateRecurPreview();
}

function toggleDow(i){
  var idx=_selDow.indexOf(i);
  if(idx>=0) _selDow.splice(idx,1); else _selDow.push(i);
  var btn=document.getElementById("dow-"+i);
  if(btn) btn.classList.toggle("active",_selDow.includes(i));
  updateRecurPreview();
}

function updateRecurPreview(){
  var dates=getRecurDates();
  var prev=document.getElementById("recur-prev");
  if(!prev) return;
  if(!dates.length){prev.style.display="none";return;}
  prev.style.display="block";
  var tagHtml=dates.slice(0,20).map(function(d){return '<span class="recur-date-tag">'+d+"</span>";}).join("");
  if(dates.length>20) tagHtml+='<span class="recur-date-tag">+'+( dates.length-20)+" 更多</span>";
  prev.innerHTML="共 <strong>"+dates.length+"</strong> 個日期：<div class=\"recur-dates-list\">"+tagHtml+"</div>";
}

function getRecurDates(){
  var freq=parseInt((document.getElementById("f-freq")||{}).value||"1");
  var rs=(document.getElementById("f-rs")||{}).value;
  var re=(document.getElementById("f-re")||{}).value;
  if(!rs||!re||!_selDow.length) return [];
  var start=new Date(rs), end=new Date(re);
  if(isNaN(start)||isNaN(end)||start>end) return [];
  var results=[], seen=new Set();
  for(var di=0;di<_selDow.length;di++){
    var dow=_selDow[di];
    var d=new Date(start);
    var diff=(dow-d.getDay()+7)%7;
    d.setDate(d.getDate()+diff);
    while(d<=end){
      var s=fmtD(d);
      if(!seen.has(s)){seen.add(s);results.push(s);}
      d=new Date(d); d.setDate(d.getDate()+freq*7);
    }
  }
  return results.sort();
}

function cdpNav(dir){_cdpMonth+=dir;if(_cdpMonth>11){_cdpMonth=0;_cdpYear++;}if(_cdpMonth<0){_cdpMonth=11;_cdpYear--;}buildCdp();}

function buildCdp(){
  var lbl=document.getElementById("cdp-lbl");
  if(!lbl)return;
  lbl.textContent=_cdpYear+"年 "+CDPMONTHS[_cdpMonth];
  var todayS=fmtD(new Date());
  var first=new Date(_cdpYear,_cdpMonth,1).getDay();
  var total=new Date(_cdpYear,_cdpMonth+1,0).getDate();
  var prev=new Date(_cdpYear,_cdpMonth,0).getDate();
  var cells=Math.ceil((first+total)/7)*7;
  var html=["日","一","二","三","四","五","六"].map(function(d){return '<div class="cdp-dow">'+d+"</div>";}).join("");
  for(var i=0;i<cells;i++){
    var dn,ds,cls="cdp-day";
    if(i<first){dn=prev-first+i+1;var pm=_cdpMonth===0?11:_cdpMonth-1,py=_cdpMonth===0?_cdpYear-1:_cdpYear;ds=py+"-"+p2(pm+1)+"-"+p2(dn);cls+=" cdp-other";}
    else if(i>=first+total){dn=i-first-total+1;var nm=_cdpMonth===11?0:_cdpMonth+1,ny=_cdpMonth===11?_cdpYear+1:_cdpYear;ds=ny+"-"+p2(nm+1)+"-"+p2(dn);cls+=" cdp-other";}
    else{dn=i-first+1;ds=_cdpYear+"-"+p2(_cdpMonth+1)+"-"+p2(dn);}
    if(ds<fmtD(new Date())&&cls.indexOf("other")<0) cls+=" cdp-past";
    if(ds===todayS) cls+=" cdp-today";
    if(_customDates.has(ds)) cls+=" cdp-sel";
    var clickable=cls.indexOf("other")<0&&cls.indexOf("past")<0;
    html+='<div class="'+cls+'"'+(clickable?' onclick="toggleCdp(\''+ds+'\')"':"")+">"+dn+"</div>";
  }
  document.getElementById("cdp-grid").innerHTML=html;
  renderCdpTags();
}

function toggleCdp(ds){if(_customDates.has(ds))_customDates.delete(ds);else _customDates.add(ds);buildCdp();}

function renderCdpTags(){
  var el=document.getElementById("cdp-tags");
  if(!el)return;
  var sorted=Array.from(_customDates).sort();
  if(!sorted.length){el.innerHTML='<div class="cdp-empty">點選上方日曆選擇日期</div>';return;}
  el.innerHTML=sorted.map(function(d){return '<div class="cdp-tag">'+d+'<span class="cdp-tag-x" onclick="toggleCdp(\''+d+'\')">✕</span></div>';}).join("");
}

function getSelectedDates(){
  if(_dateMode==="single"){var d=(document.getElementById("f-date")||{}).value;return d?[d]:[];}
  if(_dateMode==="recur") return getRecurDates();
  if(_dateMode==="custom") return Array.from(_customDates).sort();
  return [];
}

// ─── VENUE CHECKER ───────────────────────────────────────
async function checkVenueAvail(){
  var venue=(document.getElementById("f-venue")||{}).value;
  var date=(document.getElementById("f-date")||{}).value;
  if(_dateMode!=="single") date=null;
  var start=(document.getElementById("f-start")||{}).value;
  var end=(document.getElementById("f-end")||{}).value;
  var box=document.getElementById("venue-checker");
  if(!venue||!date){if(box)box.style.display="none";return;}
  if(box)box.style.display="block";
  var booked=allItems.filter(function(i){return i.status==="已批准"&&i.venue===venue&&i.date===date;});
  var body=document.getElementById("vc-body");
  var badge=document.getElementById("vc-badge");
  var inner=document.getElementById("vc-inner");
  if(!booked.length){
    if(badge) badge.className="vc-badge vc-free",badge.textContent="✓ 全日空閒";
    if(inner) inner.style.borderColor="var(--green)";
    if(body) body.innerHTML='<div class="vc-empty" style="padding:12px 0"><div style="font-size:24px;margin-bottom:6px">✅</div><div style="font-size:12px;font-weight:600;color:var(--green)">場地空閒</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+esc(venue)+" 於 "+esc(date)+" 暫無其他預訂</div></div>";
    return;
  }
  var hasClash=false;
  if(start&&end) hasClash=booked.some(function(b){return start<pt(b.endTime)&&end>pt(b.startTime);});
  if(badge) badge.className="vc-badge "+(hasClash?"vc-busy":"vc-free"),badge.textContent=hasClash?"⚠ 時段衝突":"✓ 時段可用";
  if(inner) inner.style.borderColor=hasClash?"var(--red)":start&&end?"var(--green)":"var(--border)";
  var TSTART=6,TEND=22,RANGE=TEND-TSTART;
  function toFrac(t){var p=t.split(":");return Math.max(0,Math.min(1,(parseInt(p[0])+parseInt(p[1])/60-TSTART)/RANGE));}
  var tlHtml='<div style="position:relative;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:10px">';
  if(start&&end){var sl=toFrac(start),sr=toFrac(end);tlHtml+='<div style="position:absolute;top:4px;bottom:4px;left:'+(sl*100).toFixed(1)+'%;width:'+((sr-sl)*100).toFixed(1)+'%;background:'+(hasClash?"var(--red)":"var(--blue)")+';border-radius:4px;opacity:.85;display:flex;align-items:center;justify-content:center"><span style="font-size:9px;font-weight:700;color:#fff;padding:0 3px">'+start+"–"+end+"</span></div>";}
  booked.forEach(function(b){var bl=toFrac(pt(b.startTime)),br=toFrac(pt(b.endTime));tlHtml+='<div style="position:absolute;top:4px;bottom:4px;left:'+(bl*100).toFixed(1)+'%;width:'+((br-bl)*100).toFixed(1)+'%;background:var(--green);border-radius:4px;opacity:.7"></div>';});
  for(var h=TSTART;h<=TEND;h+=2){var x=(h-TSTART)/RANGE*100;tlHtml+='<div style="position:absolute;top:0;bottom:0;left:'+x.toFixed(1)+'%;width:1px;background:var(--border)"></div><div style="position:absolute;bottom:1px;left:'+x.toFixed(1)+'%;font-size:8px;color:var(--text3);transform:translateX(-50%)">'+h+"</div>";}
  tlHtml+="</div>";
  var html=tlHtml;
  booked.forEach(function(b){var clash=start&&end&&start<pt(b.endTime)&&end>pt(b.startTime);html+='<div class="vc-slot '+(clash?"vc-slot-busy":"vc-slot-ok")+'"><div class="vc-dot" style="background:'+(clash?"var(--red)":"var(--green)")+'"></div><span class="vc-time">'+esc(pt(b.startTime))+"–"+esc(pt(b.endTime))+'</span><span class="vc-name">'+esc(b.eventName)+" ("+esc(b.teacher)+")"+"</span>"+(clash?'<span style="font-size:10px;font-weight:700;color:var(--red)">⚠ 衝突</span>':"")+"/div>";});
  if(body) body.innerHTML=html;
}

// ─── SUBMIT FORM ─────────────────────────────────────────
async function submitForm(){
  var g=function(id){return document.getElementById(id);};
  var teacher=g("f-teacher").value.trim(), email=g("f-email").value.trim();
  var wa=g("f-wa").value.trim(), name=g("f-name").value.trim();
  var start=g("f-start").value, end=g("f-end").value;
  var venue=g("f-venue").value, desc=g("f-desc").value.trim();
  var dates=getSelectedDates();
  if(!teacher||!email||!name||!start||!end){toast("請填寫所有必填欄位","err");return;}
  if(!dates.length){
    if(_dateMode==="single") toast("請選擇活動日期","err");
    else if(_dateMode==="recur") toast("請設定週期日期範圍及星期","err");
    else toast("請在日曆上點選至少一個日期","err");
    return;
  }
  if(start>=end){toast("結束時間必須晚於開始時間","err");return;}
  var btn=g("sub-btn");
  btn.disabled=true;
  btn.textContent=dates.length>1?"提交中 (共 "+dates.length+" 日)...":"提交中...";
  var fileUrl="無附件";
  var file=g("f-file").files[0];
  if(file){
    if(file.size>10*1024*1024){toast("檔案過大，上限 10MB","err");btn.disabled=false;btn.textContent="確認提交申請";return;}
    try{fileUrl=await uploadDrive(file);}
    catch(e){toast("附件上傳失敗："+e.message,"err");btn.disabled=false;btn.textContent="確認提交申請";return;}
  }
  var recurNote="";
  if(_dateMode==="recur"){
    var freq=(g("f-freq")||{}).value;
    var freqLbl={"1":"每週","2":"每兩週","3":"每三週","4":"每月"};
    var dows=_selDow.map(function(i){return["日","一","二","三","四","五","六"][i];}).join("、");
    recurNote="[週期："+(freqLbl[freq]||"")+"，星期"+dows+"] ";
  } else if(_dateMode==="custom"&&dates.length>1){
    recurNote="[自選 "+dates.length+" 個日期] ";
  }
  var fullDesc=recurNote+desc;
  try{
    var done=0;
    for(var di=0;di<dates.length;di++){
      await sheetsAppend([new Date().toISOString(),teacher,email,wa,name,start,end,venue,dates[di],"",fullDesc,"待處理",fileUrl]);
      done++;
      if(dates.length>1) btn.textContent="提交中 ("+done+"/"+dates.length+")...";
    }
    // Notify admin(s) of new application
    var adminSubject = "【LWCPS】新活動申請：" + name + "（" + teacher + "）";
    var adminBody =
      "收到新的活動場地申請，請登入系統審批。\n\n" +
      "申請人：" + teacher + "\n" +
      "電郵：" + email + "\n" +
      (wa ? "WhatsApp：" + wa + "\n" : "") +
      "活動名稱：" + name + "\n" +
      "場地：" + venue + "\n" +
      "時段：" + start + " – " + end + "\n" +
      "日期：" + dates.join("、") + "\n" +
      (desc ? "說明：" + desc + "\n" : "") +
      (fileUrl !== "無附件" ? "附件：" + fileUrl + "\n" : "");
    try {
      await Promise.all(CFG.ADMIN_EMAILS.map(function(addr){ return sendMail(addr, adminSubject, adminBody); }));
    } catch (mailErr) {
      console.warn("Admin notification email failed:", mailErr);
    }
    var msg=dates.length>1?"✅ 已提交 "+dates.length+" 個日期的申請！管理員將盡快審批。":"✅ 提交成功！管理員將盡快審批您的申請。";
    toast(msg,"ok");
    writeAudit("sub","新申請："+name+"（"+teacher+"，"+venue+"，共 "+dates.length+" 日）");
    setTimeout(function(){renderTeacherShell();},2500);
  }catch(e){toast("提交失敗："+e.message,"err");btn.disabled=false;btn.textContent="確認提交申請";}
}

      <div class="bulk-bar" id="bulk-bar">
        <span class="bulk-info" id="bulk-info"></span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-success" onclick="bulkAction('已批准')">✓ 批量批准</button>
          <button class="btn btn-danger" onclick="bulkAction('已拒絕')">✕ 批量拒絕</button>
          <button class="btn" onclick="clearSel()">取消選擇</button>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="搜尋老師、活動、場地..." value="${esc(searchQuery)}" oninput="applySearch(this.value)">
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <select class="sort-sel" onchange="applySort(this.value)">
            <option value="date" ${sortField==="date"?"selected":""}>日期排序</option>
            <option value="teacher" ${sortField==="teacher"?"selected":""}>老師排序</option>
            <option value="status" ${sortField==="status"?"selected":""}>狀態排序</option>
            <option value="venue" ${sortField==="venue"?"selected":""}>場地排序</option>
          </select>
          <button class="btn btn-icon" onclick="toggleSortDir()" title="切換排序方向">${sortDir===1?"↑":"↓"}</button>
          <span style="font-size:12px;color:var(--text3)">${filtered.length} 筆</span>
          <button class="btn" onclick="exportExcel()">📊 Excel</button>
          <button class="btn" onclick="loadAdmin(true)">↻</button>
        </div>
      </div>
      <div id="panel-list" style="display:${activeTab==="list"?"block":"none"}">${renderTable(filtered)}</div>
      <div id="panel-cal"  style="display:${activeTab==="cal"?"block":"none"}">${renderCalHTML()}</div>
      <div id="panel-charts" style="display:${activeTab==="charts"?"block":"none"}">${renderChartsHTML()}</div>
      <div id="panel-audit" style="display:${activeTab==="audit"?"block":"none"}"><div class="loading-screen" style="min-height:200px"><div class="spinner"></div>載入...</div></div>
    </div>
  </div>`;
  if(activeTab==="cal") buildCal();
  if(activeTab==="charts") buildCharts();
  if(activeTab==="audit") loadAuditLog();
}

function setFilter(f){currentFilter=f;renderAdmin();}
function applySearch(q){searchQuery=q;renderAdmin();}
function applySort(f){sortField=f;renderAdmin();}
function toggleSortDir(){sortDir*=-1;renderAdmin();}
function getFiltered(){
  var items=allItems;
  if(currentFilter==="conflict") items=items.filter(function(i){return i.conflict;});
  else if(currentFilter!=="all") items=items.filter(function(i){return i.status===currentFilter;});
  if(searchQuery.trim()){var q=searchQuery.toLowerCase();items=items.filter(function(i){return i.teacher.toLowerCase().includes(q)||i.eventName.toLowerCase().includes(q)||i.venue.toLowerCase().includes(q)||i.email.toLowerCase().includes(q)||i.description.toLowerCase().includes(q);});}
  items=items.slice().sort(function(a,b){var va=a[sortField]||"",vb=b[sortField]||"";return va.localeCompare(vb)*sortDir;});
  return items;
}
function switchTab(name,btn){
  activeTab=name;
  ["list","cal","charts","audit"].forEach(function(t){var p=document.getElementById("panel-"+t);if(p)p.style.display=t===name?"block":"none";});
  document.querySelectorAll(".tab-item").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  if(name==="cal") buildCal();
  if(name==="charts") buildCharts();
  if(name==="audit") loadAuditLog();
}

// ─── TABLE ────────────────────────────────────────────────
function isOverdue(item){if(item.status!=="待處理")return false;var ts=new Date(item.timestamp);if(isNaN(ts))return false;return(Date.now()-ts.getTime())>3*24*60*60*1000;}

function renderTable(items){
  if(!items||!items.length) return '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">暫無申請紀錄</div><div>符合條件的申請將顯示於此</div></div>';
  var rows=items.slice().reverse().map(function(item){
    var pdf=(item.fileUrl&&item.fileUrl!=="無附件")?'<a href="'+esc(item.fileUrl)+'" target="_blank" class="pdf-link">PDF</a>':'<span style="color:var(--border2)">–</span>';
    var bdCls=item.status==="已批准"?"bd-approved":item.status==="已拒絕"?"bd-rejected":item.status==="要求修改"?"bd-amend":item.conflict?"bd-conflict":"bd-pending";
    var dotCls=item.status==="已批准"?"dot-approved":item.conflict?"dot-conflict":"dot-pending";
    var clash=item.conflict?'<div class="conflict-pill">⚠ '+esc(item.conflict)+"</div>":"";
    var over=isOverdue(item)?'<span class="overdue-tag">⚠ 逾期</span>':"";
    var rc=(item.conflict?"row-conflict":"")+(selectedIds.has(item.id)?" row-selected":"");
    var si=encodeURIComponent(JSON.stringify(item));
    var waNum=item.whatsapp?item.whatsapp.replace(/\D/g,""):"";
    var waBtn=waNum?'<button class="act-btn ab-wa" onclick="openWA(\''+waNum+'\',\''+esc(item.teacher)+'\',\''+esc(item.eventName)+'\')">WA</button>':"";
    return '<tr class="'+rc+'"><td class="th-check"><input type="checkbox" '+(selectedIds.has(item.id)?"checked":"")+" onchange=\"toggleSel('"+item.id+"',this.checked)\"></td><td><div class=\"t-name\">"+esc(item.teacher)+'</div><div class="t-email">'+esc(item.email)+"</div></td><td><div class=\"ev-name\">"+esc(item.eventName)+over+'</div><div class="ev-desc">'+esc(item.description||"無說明")+"</div>"+clash+"</td><td class=\"hide-md\" style=\"white-space:nowrap;font-size:12px\">"+esc(item.date)+"</td><td><span class=\"time-mono\">"+esc(item.startTime)+"–"+esc(item.endTime)+'</span></td><td class="hide-md">'+esc(item.venue)+'</td><td class="hide-md" style="text-align:center">'+pdf+"</td><td><span class=\"badge "+bdCls+'"><span class="dot '+dotCls+'"></span>'+esc(item.status)+"</span></td><td><div class=\"acts\"><button class=\"act-btn ab-ok\" onclick=\"openAction('"+item.id+"','ok')\">批准</button><button class=\"act-btn ab-no\" onclick=\"openAction('"+item.id+"','no')\">拒絕</button><button class=\"act-btn ab-am\" onclick=\"openAction('"+item.id+"','am')\">修改</button><button class=\"act-btn ab-ed\" onclick=\"openEditM('"+si+"')\">編輯</button>"+waBtn+"</div></td></tr>";
  }).join("");
  var mcards=items.slice().reverse().map(function(item){
    var sc=item.status==="已批准"?"bd-approved":item.status==="已拒絕"?"bd-rejected":item.status==="要求修改"?"bd-amend":item.conflict?"bd-conflict":"bd-pending";
    var over=isOverdue(item)?'<span class="overdue-tag">⚠ 逾期</span>':"";
    var si=encodeURIComponent(JSON.stringify(item));
    var waNum=item.whatsapp?item.whatsapp.replace(/\D/g,""):"";
    var waBtn=waNum?'<button class="act-btn ab-wa" onclick="openWA(\''+waNum+'\',\''+esc(item.teacher)+'\',\''+esc(item.eventName)+'\')">WA</button>':"";
    var clashNote=item.conflict?'<div class="mc-clash">⚠ 衝突：'+esc(item.conflict)+"</div>":"";
    return '<div class="m-card '+(item.conflict?"m-conflict":"")+" "+(selectedIds.has(item.id)?"m-sel":"")+'">'+'<div class="mc-top"><div style="display:flex;align-items:center;gap:6px"><input type="checkbox" '+(selectedIds.has(item.id)?"checked":"")+" onchange=\"toggleSel('"+item.id+"',this.checked)\"><div class=\"mc-title\">"+esc(item.eventName)+over+"</div></div>"+'<span class="badge '+sc+'">'+esc(item.status)+"</span></div>"+clashNote+'<div class="mc-meta"><span class="mc-pill">👤 '+esc(item.teacher)+'</span><span class="mc-pill">📅 '+esc(item.date)+'</span><span class="mc-pill">⏰ '+esc(item.startTime)+"–"+esc(item.endTime)+'</span><span class="mc-pill">📍 '+esc(item.venue)+"</span>"+(item.fileUrl&&item.fileUrl!=="無附件"?'<a href="'+esc(item.fileUrl)+'" target="_blank" class="mc-pill" style="color:var(--red)">📎 PDF</a>':"")+"</div>"+'<div class="mc-acts"><button class="act-btn ab-ok" onclick="openAction(\''+item.id+"\','ok')\">批准</button><button class=\"act-btn ab-no\" onclick=\"openAction('"+item.id+"','no')\">拒絕</button><button class=\"act-btn ab-am\" onclick=\"openAction('"+item.id+"','am')\">修改</button><button class=\"act-btn ab-ed\" onclick=\"openEditM('"+si+"')\">編輯</button>"+waBtn+"</div></div>";
  }).join("");
  return '<div class="tbl-outer" id="tbl-outer"><div class="tbl-overlay" id="tbl-ov"><div class="spinner"></div>更新中...</div><table><thead><tr><th class="th-check"><input type="checkbox" onchange="toggleAll(this.checked)"></th><th>申請老師</th><th>活動 / 說明</th><th class="hide-md">日期</th><th>時段</th><th class="hide-md">場地</th><th class="hide-md">附件</th><th>狀態</th><th>操作</th></tr></thead><tbody>'+rows+"</tbody></table>"+'<div class="mob-cards">'+mcards+"</div></div>";
}

// ─── BULK SELECT ──────────────────────────────────────────
function toggleSel(id,checked){checked?selectedIds.add(id):selectedIds.delete(id);updateBulkBar();}
function toggleAll(checked){var fl=getFiltered();fl.forEach(function(i){checked?selectedIds.add(i.id):selectedIds.delete(i.id);});updateBulkBar();document.querySelectorAll("tbody tr").forEach(function(r){var cb=r.querySelector("input[type=checkbox]");if(cb){cb.checked=checked;r.classList.toggle("row-selected",checked);}});}
function clearSel(){selectedIds.clear();renderAdmin();}
function updateBulkBar(){var bar=document.getElementById("bulk-bar"),info=document.getElementById("bulk-info");if(!bar)return;if(selectedIds.size>0){bar.classList.add("show");info.textContent="已選擇 "+selectedIds.size+" 項申請";}else bar.classList.remove("show");}
async function bulkAction(status){
  if(!confirm("確定要將 "+selectedIds.size+" 項申請標記為「"+status+"」？"))return;
  var ov=document.getElementById("tbl-ov");if(ov)ov.classList.add("show");
  var done=0,errors=0;
  for(var id of selectedIds){
    var item=allItems.find(function(i){return i.id===id;});
    if(!item)continue;
    try{
      if(status==="已批准"){var clash=checkConflict(item,allItems);if(clash){toast("「"+item.eventName+"」有衝突，已跳過","warn");errors++;continue;}await sheetsUpdateStatus(item.rowIndex,status);item.status=status;try{await createCalEvent(item);}catch{}try{await sendMail(item.email,"【LWCPS】活動申請已批准 - "+item.eventName,buildBody("ok",item,"",""));}catch{}}
      else{await sheetsUpdateStatus(item.rowIndex,status);item.status=status;try{await sendMail(item.email,"【LWCPS】活動申請未獲批准 - "+item.eventName,buildBody("no",item,"批量處理",""));}catch{}}
      done++;
    }catch(e){errors++;console.error(e);}
  }
  toast("已處理 "+done+" 項"+(errors>0?"，"+errors+" 項失敗":""),errors>0?"warn":"ok");
  await loadAdmin(true);
}

// ─── ACTION MODAL ─────────────────────────────────────────
function openAction(id,tab){
  var item=allItems.find(function(i){return i.id===id;});
  if(!item)return;
  currentActionItem=item;
  document.getElementById("am-event").textContent=item.eventName;
  document.getElementById("am-pills").innerHTML=[item.teacher,item.date,item.startTime+"–"+item.endTime,item.venue].map(function(t){return '<span class="ism-pill">'+esc(t)+"</span>";}).join("");
  document.getElementById("rej-reason").value="";
  document.getElementById("am-sug").value="";
  setActionTab(tab);
  document.getElementById("actionModal").classList.add("open");
}
function setActionTab(tab){
  currentActionTab=tab;
  ["ok","no","am"].forEach(function(t){document.getElementById("aseg-"+t).classList.toggle("aseg-active",t===tab);document.getElementById("apanel-"+t).style.display=t===tab?"block":"none";});
  var btn=document.getElementById("am-confirm");
  var titles={ok:"確認批准",no:"確認拒絕並通知",am:"發送修改請求"};
  btn.textContent=titles[tab];
  document.getElementById("am-title").textContent=tab==="ok"?"批准申請":tab==="no"?"拒絕申請":"要求修改";
  refreshPreviews();
}
function refreshPreviews(){
  if(!currentActionItem)return;
  var it=currentActionItem;
  document.getElementById("prev-ok").textContent=buildBody("ok",it,"","");
  document.getElementById("prev-no").textContent=buildBody("no",it,document.getElementById("rej-reason").value,"");
  document.getElementById("prev-am").textContent=buildBody("am",it,"",document.getElementById("am-sug").value);
}
function closeActionModal(){document.getElementById("actionModal").classList.remove("open");currentActionItem=null;}
function buildBody(type,it,rej,sug){
  if(type==="ok") return "親愛的 "+it.teacher+" 老師，\n\n您於 "+it.date+" 申請的「"+it.eventName+"」("+it.startTime+"–"+it.endTime+"，"+it.venue+") 已獲批准，並已同步至學校共享日曆。\n\n如有查詢，請聯絡Connie Wong。\nLWCPS Connie Wong";
  if(type==="no") return "親愛的 "+it.teacher+" 老師，\n\n很抱歉，您於 "+it.date+" 申請的「"+it.eventName+"」("+it.startTime+"–"+it.endTime+"，"+it.venue+") 未獲批准。\n\n原因："+( rej||"(請填寫原因)")+"\n\n如有查詢，請聯絡Connie Wong。\nLWCPS Connie Wong";
  return "親愛的 "+it.teacher+" 老師，\n\n您於 "+it.date+" 申請的「"+it.eventName+"」("+it.startTime+"–"+it.endTime+"，"+it.venue+") 需要修改後方可批准。\n\n修改建議："+(sug||"(請填寫建議)")+"\n\n請按建議修改後重新提交，如有查詢請聯絡Connie Wong。\nLWCPS Connie Wong";
}
async function confirmAction(){
  var item=currentActionItem;if(!item)return;
  var tab=currentActionTab;
  var rej=document.getElementById("rej-reason").value.trim();
  var sug=document.getElementById("am-sug").value.trim();
  if(tab==="no"&&!rej){toast("請填寫拒絕原因","err");return;}
  if(tab==="am"&&!sug){toast("請填寫修改建議","err");return;}
  var ov=document.getElementById("tbl-ov");if(ov)ov.classList.add("show");
  closeActionModal();
  try{
    if(tab==="ok"){
      var clash=checkConflict(item,allItems);
      if(clash){toast("⚠ 場地衝突！"+clash,"warn");if(ov)ov.classList.remove("show");return;}
      await sheetsUpdateStatus(item.rowIndex,"已批准");item.status="已批准";
      try{await createCalEvent(item);}catch(e){toast("已批准，但日曆同步失敗："+e.message,"warn");}
      try{await sendMail(item.email,"【LWCPS】活動申請已批准 - "+item.eventName,buildBody("ok",item,"",""));toast("✅ 已批准，已同步日曆並發送通知電郵","ok");}
      catch(e){toast("已批准並同步日曆，但電郵失敗："+e.message,"warn");}
      writeAudit("ok","批准申請："+item.eventName+"（"+item.teacher+"，"+item.date+"）");
    }else if(tab==="no"){
      await sheetsUpdateStatus(item.rowIndex,"已拒絕");item.status="已拒絕";
      try{await sendMail(item.email,"【LWCPS】活動申請未獲批准 - "+item.eventName,buildBody("no",item,rej,""));toast("✅ 已拒絕並發送通知電郵","ok");}
      catch(e){toast("已拒絕，但電郵失敗："+e.message,"warn");}
      writeAudit("no","拒絕申請："+item.eventName+"（"+item.teacher+"，"+item.date+"）",rej);
    }else{
      await sheetsUpdateStatus(item.rowIndex,"要求修改");item.status="要求修改";
      try{await sendMail(item.email,"【LWCPS】活動申請需要修改 - "+item.eventName,buildBody("am",item,"",sug));toast("✅ 修改請求已發送","ok");}
      catch(e){toast("已標記修改，但電郵失敗："+e.message,"warn");}
      writeAudit("am","要求修改："+item.eventName+"（"+item.teacher+"，"+item.date+"）",sug);
    }
    await loadAdmin(true);
  }catch(e){toast("操作失敗："+e.message,"err");if(ov)ov.classList.remove("show");}
}

function exportExcel(){
  var items=getFiltered();if(!items.length){toast("沒有資料可匯出","warn");return;}
  var hdrs=["時間戳記","老師","電郵","WhatsApp","活動名稱","開始時間","結束時間","場地","日期","說明","狀態","附件"];
  var rows=items.map(function(i){return[i.timestamp,i.teacher,i.email,i.whatsapp,i.eventName,i.startTime,i.endTime,i.venue,i.date,i.description,i.status,i.fileUrl];});
  var csv="\uFEFF"+[hdrs].concat(rows).map(function(r){return r.map(function(c){return'"'+String(c||"").replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));a.download="LWCPS_活動申請_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(a.href);
  toast("✅ 已匯出 Excel 檔案","ok");
}

// ─── CHARTS ───────────────────────────────────────────────
function renderChartsHTML(){
  return '<div class="charts-grid" id="charts-grid"><div class="chart-card"><div class="chart-title">場地使用頻率</div><div id="chart-bar"></div></div><div class="chart-card"><div class="chart-title">星期使用熱圖</div><div class="heatmap-day-lbl">'+["日","一","二","三","四","五","六"].map(function(d){return "<div>"+d+"</div>";}).join("")+'</div><div id="chart-heat"></div><div class="heatmap-hr-lbl"><span>8:00</span><span>12:00</span><span>16:00</span><span>20:00</span></div></div><div class="chart-card"><div class="chart-title">每月申請趨勢</div><div id="chart-month"></div></div><div class="chart-card"><div class="chart-title">申請狀態分佈</div><div id="chart-status"></div></div></div>';
}
function buildCharts(){
  var venueCnt={};
  allItems.forEach(function(i){if(i.venue)venueCnt[i.venue]=(venueCnt[i.venue]||0)+1;});
  var maxV=Math.max.apply(null,Object.values(venueCnt).concat([1]));
  var barEl=document.getElementById("chart-bar");
  if(barEl) barEl.innerHTML=Object.entries(venueCnt).sort(function(a,b){return b[1]-a[1];}).map(function(e){return '<div class="bar-row"><div class="bar-label">'+esc(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/maxV*100)+'%"><span>'+e[1]+"</span></div></div></div>";}).join("")||'<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">暫無數據</div>';
  var hDOW=Array.from({length:7},function(){return Array(12).fill(0);});
  allItems.forEach(function(i){if(!i.date||!i.startTime)return;try{var dow=new Date(i.date).getDay(),h=parseInt(i.startTime.split(":")[0]),slot=Math.max(0,Math.min(11,h-8));if(dow>=0&&dow<7)hDOW[dow][slot]++;}catch{}});
  var maxH=Math.max.apply(null,hDOW.reduce(function(a,b){return a.concat(b);}).concat([1]));
  var heatEl=document.getElementById("chart-heat");
  if(heatEl){var hh='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';for(var d=0;d<7;d++){hh+='<div style="display:grid;gap:3px">';for(var h=0;h<12;h++){var v=hDOW[d][h],alpha=Math.max(0.08,v/maxH);hh+='<div class="hm-cell" style="background:rgba(37,99,235,'+alpha.toFixed(2)+')" title="'+["日","一","二","三","四","五","六"][d]+" "+(h+8)+":00 — "+v+"個申請\"></div>";}hh+="</div>";}hh+="</div>";heatEl.innerHTML=hh;}
  var mCnt={};allItems.forEach(function(i){if(!i.date)return;var ym=i.date.slice(0,7);mCnt[ym]=(mCnt[ym]||0)+1;});
  var mKeys=Object.keys(mCnt).sort().slice(-6);
  var maxM=Math.max.apply(null,mKeys.map(function(k){return mCnt[k];}).concat([1]));
  var mEl=document.getElementById("chart-month");
  if(mEl) mEl.innerHTML=mKeys.map(function(k){return '<div class="bar-row"><div class="bar-label" style="font-size:10px">'+k+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(mCnt[k]/maxM*100)+'%;background:var(--teal)"><span>'+mCnt[k]+"</span></div></div></div>";}).join("")||'<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">暫無數據</div>';
  var st=calcStats(),total=Math.max(st.pending+st.approved+st.rejected,1);
  var sEl=document.getElementById("chart-status");
  if(sEl) sEl.innerHTML=[{l:"已批准",v:st.approved,c:"var(--green)"},{l:"待處理",v:st.pending,c:"var(--amber)"},{l:"已拒絕",v:st.rejected,c:"var(--red)"}].map(function(x){return '<div class="bar-row"><div class="bar-label">'+x.l+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(x.v/total*100)+'%;background:'+x.c+'"><span>'+x.v+"</span></div></div></div>";}).join("");
}

// ─── AUDIT LOG ────────────────────────────────────────────

    var data=await r.json();

// ─── CALENDAR VIEW ────────────────────────────────────────
function renderCalHTML(){
  return '<div class="cal-bar"><div class="cal-nav-g"><button class="btn btn-icon" onclick="calNav(-1)">&#8249;</button><div class="cal-month-lbl" id="cal-lbl"></div><button class="btn btn-icon" onclick="calNav(1)">&#8250;</button></div><button class="btn" onclick="calNow()">今天</button></div><div class="cal-legend"><div class="leg-item"><div class="leg-sw ls-ok"></div>已批准</div><div class="leg-item"><div class="leg-sw ls-pend"></div>待處理</div><div class="leg-item"><div class="leg-sw ls-clash"></div>衝突 (閃爍)</div></div><div class="cal-dow-row">'+["日","一","二","三","四","五","六"].map(function(d){return '<div class="cal-dow">'+d+"</div>";}).join("")+'</div><div id="cal-g"></div>';
}
function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}buildCal();}
function calNow(){var n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();buildCal();}
function buildCal(){
  var lbl=document.getElementById("cal-lbl");if(!lbl)return;
  lbl.textContent=calYear+"年 "+MONTHS[calMonth];
  var todayS=fmtD(new Date()),first=new Date(calYear,calMonth,1).getDay(),total=new Date(calYear,calMonth+1,0).getDate(),prev=new Date(calYear,calMonth,0).getDate(),cells=Math.ceil((first+total)/7)*7;
  var byD={};allItems.forEach(function(it){if(!it.date)return;if(!byD[it.date])byD[it.date]=[];byD[it.date].push(it);});
  var html="";
  for(var i=0;i<cells;i++){
    var dn,ds,cls="cal-cell";
    if(i<first){dn=prev-first+i+1;var pm=calMonth===0?11:calMonth-1,py=calMonth===0?calYear-1:calYear;ds=py+"-"+p2(pm+1)+"-"+p2(dn);cls+=" dim";}
    else if(i>=first+total){dn=i-first-total+1;var nm=calMonth===11?0:calMonth+1,ny=calMonth===11?calYear+1:calYear;ds=ny+"-"+p2(nm+1)+"-"+p2(dn);cls+=" dim";}
    else{dn=i-first+1;ds=calYear+"-"+p2(calMonth+1)+"-"+p2(dn);}
    if(ds===todayS)cls+=" now";
    var evs=byD[ds]||[],MAX=3;
    var evH=evs.slice(0,MAX).map(function(it){var ec=it.conflict?"cal-ev cev-clash":it.status==="已批准"?"cal-ev cev-ok":"cal-ev cev-pend";var si=encodeURIComponent(JSON.stringify(it));return '<div class="'+ec+'" onclick="showPop(event,\''+si+'\')" title="'+esc(it.eventName)+'">'+esc(it.startTime)+" "+esc(it.eventName)+"</div>";}).join("");
    if(evs.length>MAX) evH+='<div class="cal-more">+'+( evs.length-MAX)+" 更多</div>";
    html+='<div class="'+cls+'"><div class="day-n">'+dn+"</div>"+evH+"</div>";
  }
  document.getElementById("cal-g").innerHTML='<div class="cal-grid">'+html+"</div>";
}

// ─── POPOVER ─────────────────────────────────────────────
function showPop(e,enc){
  e.stopPropagation();
  var it=JSON.parse(decodeURIComponent(enc));
  document.getElementById("pop-title").textContent=it.eventName;
  document.getElementById("pop-teacher").textContent=it.teacher;
  document.getElementById("pop-date").textContent=it.date;
  document.getElementById("pop-time").textContent=it.startTime+" – "+it.endTime;
  document.getElementById("pop-venue").textContent=it.venue;
  document.getElementById("pop-desc").textContent=it.description||"無";
  document.getElementById("pop-extra").innerHTML=it.conflict?'<div class="pop-conflict"><strong>⚠ 場地衝突</strong>'+esc(it.conflict)+"</div>":"";
  var pop=document.getElementById("popover");pop.classList.add("show");
  var x=e.clientX+12,y=e.clientY+12;
  if(x+270>window.innerWidth)x=e.clientX-270;if(y+280>window.innerHeight)y=e.clientY-280;
  pop.style.left=x+"px";pop.style.top=y+"px";
}
function closePop(){document.getElementById("popover").classList.remove("show");}
document.addEventListener("click",function(e){var p=document.getElementById("popover");if(p&&p.classList.contains("show")&&!p.contains(e.target))closePop();});

// ─── CONFLICT ────────────────────────────────────────────
function checkConflict(item,items){
  if(item.status==="已拒絕")return null;
  var s1=pt(item.startTime),e1=pt(item.endTime);
  for(var i=0;i<items.length;i++){var a=items[i];if(a.id===item.id||a.status!=="已批准"||a.venue!==item.venue||a.date!==item.date)continue;if(s1<pt(a.endTime)&&e1>pt(a.startTime))return a.teacher+" 的「"+a.eventName+"」("+pt(a.startTime)+"–"+pt(a.endTime)+")";}
  return null;
}
function enrichConflicts(){allItems.forEach(function(i){i.conflict=checkConflict(i,allItems);});}
function calcStats(){var p=0,a=0,r=0,c=0;allItems.forEach(function(i){if(i.status==="待處理")p++;else if(i.status==="已批准")a++;else if(i.status==="已拒絕")r++;if(i.conflict)c++;});return{pending:p,approved:a,rejected:r,conflicts:c};}

// ─── SHEETS API ───────────────────────────────────────────
function sb(){return CFG.API_BASE;}
function ah(){return{Authorization:"Bearer "+gToken,"Content-Type":"application/json"};}
async function sheetsRead(){
  try {
    const r = await fetch(CFG.API_BASE + '/bookings');
    if(!r.ok){
      var msg = "讀取試算表失敗 " + r.status;
      try {
        var err = await r.json();
        if (err && err.error) msg += "：" + err.error;
      } catch (_) {}
      throw new Error(msg);
    }
    const values = await r.json();
    return (values || []).slice(1).map(function(row, idx) {
      return {
        id: row[0] || uid(),
        rowIndex: idx + 2,
        timestamp: row[0] || "",
        teacher: row[1] || "",
        email: row[2] || "",
        whatsapp: row[3] || "",
        eventName: row[4] || "",
        startTime: row[5] || "",
        endTime: row[6] || "",
        venue: row[7] || "",
        date: row[8] || "",
        description: row[10] || "",
        status: row[11] || "待處理",
        fileUrl: row[12] || "無附件",
        conflict: null
      };
    });
  } catch(error) {
    console.error('Error reading bookings:', error);
    throw error;
  }
}
async function sheetsAppend(values){
  try {
    const r = await fetch(CFG.API_BASE + '/bookings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({values: values})
    });
    if(!r.ok) throw new Error("新增紀錄失敗");

  } catch(error) {
    console.error('Error appending booking:', error);
    throw error;
  }

async function sheetsUpdateStatus(ri,status){var r=await fetch(CFG.API_BASE+"/sheets/update-status",{method:"PUT",headers:{'Content-Type':'application/json'},body:JSON.stringify({rowIndex:ri,status:status})});if(!r.ok){var e=await r.json();throw new Error(e.error||r.status);}}
async function sheetsUpdateFields(ri,f){var r=await fetch(CFG.API_BASE+"/sheets/update-fields",{method:"PUT",headers:{'Content-Type':'application/json'},body:JSON.stringify({rowIndex:ri,fields:f})});if(!r.ok){var e=await r.json();throw new Error(e.error||r.status);}}

// ─── DRIVE ───────────────────────────────────────────────
async function uploadDrive(file){
  var meta={name:file.name,mimeType:file.type},b="lwcps_b",b64=await fileB64(file);
  var body="--"+b+"\r\nContent-Type: application/json\r\n\r\n"+JSON.stringify(meta)+"\r\n--"+b+"\r\nContent-Type: "+file.type+"\r\nContent-Transfer-Encoding: base64\r\n\r\n"+b64+"\r\n--"+b+"--";
  var r=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink",{method:"POST",headers:{Authorization:"Bearer "+gToken,"Content-Type":"multipart/related; boundary="+b},body:body});
  if(!r.ok){var e=await r.json();throw new Error(e.error&&e.error.message||"Drive upload failed");}
  var dd=await r.json();
  await fetch("https://www.googleapis.com/drive/v3/files/"+dd.id+"/permissions",{method:"POST",headers:ah(),body:JSON.stringify({role:"reader",type:"anyone"})});
  return dd.webViewLink;
}
function fileB64(file){return new Promise(function(res,rej){var rd=new FileReader();rd.onload=function(){res(rd.result.split(",")[1]);};rd.onerror=function(){rej(new Error("Read failed"));};rd.readAsDataURL(file);});}

// ─── CALENDAR API ────────────────────────────────────────
async function createCalEvent(item){
  if(!item.date||!item.startTime||!item.endTime)throw new Error("日期或時間無效");
  var r=await fetch(CFG.API_BASE+"/calendar-events",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({event:{
    summary:item.eventName,
    location:item.venue,
    description:"老師："+item.teacher+"\n時間："+item.startTime+" - "+item.endTime+"\n地點："+item.venue+"\n\n說明："+(item.description||""),
    start:{dateTime:item.date+"T"+item.startTime+":00",timeZone:"Asia/Hong_Kong"},
    end:{dateTime:item.date+"T"+item.endTime+":00",timeZone:"Asia/Hong_Kong"},
    colorId:"2"
  }})});
  if(!r.ok){
    var e=await r.json();
    throw new Error(e.error||(e.details&&JSON.stringify(e.details))||r.status);
  }
}

// ─── GMAIL ───────────────────────────────────────────────
async function sendMail(to,subject,body){
  var lines=["To: "+to,"Subject: =?UTF-8?B?"+btoa(unescape(encodeURIComponent(subject)))+"?=","MIME-Version: 1.0","Content-Type: text/plain; charset=UTF-8","Content-Transfer-Encoding: base64","",btoa(unescape(encodeURIComponent(body)))];
  var raw=btoa(unescape(encodeURIComponent(lines.join("\r\n")))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
  var r=await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send",{method:"POST",headers:ah(),body:JSON.stringify({raw:raw})});
  if(!r.ok){var e=await r.json();throw new Error(e.error&&e.error.message||r.status);}
}

// ─── HELPERS ─────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function p2(n){return String(n).padStart(2,"0");}
function pt(v){if(!v)return"";var p=String(v).trim().split(":");return p.length<2?v:p[0].padStart(2,"0")+":"+p[1].padStart(2,"0");}
function fmtD(d){return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
var _tt;
function toast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="show"+(type==="err"?" t-err":type==="warn"?" t-warn":type==="ok"?" t-ok":"");clearTimeout(_tt);_tt=setTimeout(function(){t.className="";},4500);}

function applyTheme(theme){document.documentElement.setAttribute("data-theme",theme);var btn=document.getElementById("theme-btn");if(btn)btn.textContent=theme==="dark"?"☀️":"🌙";localStorage.setItem("lwcps_theme",theme);}
function toggleTheme(){var cur=document.documentElement.getAttribute("data-theme")||"light";applyTheme(cur==="dark"?"light":"dark");}
